<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PicStitch</title>
  
  <!-- PWA Meta Tags for iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PicStitch">
  <link rel="apple-touch-icon" href="https://via.placeholder.com/192/000000/FFFFFF/?text=PS">
  
  <link rel="manifest" href="manifest.json">

  <style>
    :root {
      --bg: #121212;
      --text: #ffffff;
      --primary: #007aff;
      --surface: #1e1e1e;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 { margin-top: 10px; font-size: 24px; }
    .card {
      background: var(--surface);
      padding: 20px;
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      box-sizing: border-box;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      margin-bottom: 20px;
    }
    label, button, input {
      display: block;
      width: 100%;
      margin-bottom: 15px;
      font-size: 16px;
    }
    input[type="file"] {
      background: #333;
      padding: 10px;
      border-radius: 8px;
    }
    
    /* Graphical Layout Selector Styles */
    .layout-selector {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .layout-option {
      flex: 1;
      padding: 12px 5px;
      background: #333;
      border: 2px solid transparent;
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      transition: 0.2s;
    }
    .layout-option.selected {
      border-color: var(--primary);
      background: #2a2a2a;
    }
    .layout-option span {
      font-size: 12px;
      font-weight: 500;
    }
    /* Mini-icons made with CSS */
    .icon-row { display: flex; gap: 3px; }
    .icon-col { display: flex; flex-direction: column; gap: 3px; }
    .icon-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; }
    .box { width: 14px; height: 14px; background: #999; border-radius: 2px; }

    button {
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
    }
    button:disabled {
      background-color: #555;
      color: #888;
    }
    #canvas-container {
      width: 100%;
      max-width: 400px;
      margin-bottom: 20px;
      border-radius: 8px;
      overflow: hidden;
    }
    canvas {
      width: 100%;
      height: auto;
      display: block;
      background: #000;
    }
    #error-msg {
      color: #ff453a;
      font-size: 14px;
      margin-bottom: 10px;
      text-align: center;
    }
  </style>
</head>
<body>

  <h1>PicStitch</h1>

  <div class="card">
    <label for="imageInput">Select 2, 3, 4, 5, 6, 7, 8, or 10 pictures:</label>
    <input type="file" id="imageInput" multiple accept="image/*">

    <div id="error-msg"></div>

    <label>Layout Style:</label>
    <div class="layout-selector" id="layoutSelector">
      <div class="layout-option selected" data-layout="grid">
        <div class="icon-grid"><div class="box"></div><div class="box"></div><div class="box"></div><div class="box"></div></div>
        <span>Grid</span>
      </div>
      <div class="layout-option" data-layout="row">
        <div class="icon-row"><div class="box"></div><div class="box"></div><div class="box"></div></div>
        <span>Side-by-Side</span>
      </div>
      <div class="layout-option" data-layout="col">
        <div class="icon-col"><div class="box"></div><div class="box"></div><div class="box"></div></div>
        <span>Stacked</span>
      </div>
    </div>

    <button id="stitchBtn">Stitch Images</button>
  </div>

  <div id="canvas-container" style="display: none;">
    <canvas id="outputCanvas"></canvas>
  </div>

  <button id="saveBtn" style="display: none; max-width: 400px; margin-bottom: 40px;">Save to Photos</button>

  <script>
    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    const imageInput = document.getElementById('imageInput');
    const stitchBtn = document.getElementById('stitchBtn');
    const saveBtn = document.getElementById('saveBtn');
    const canvas = document.getElementById('outputCanvas');
    const ctx = canvas.getContext('2d');
    const errorMsg = document.getElementById('error-msg');
    const canvasContainer = document.getElementById('canvas-container');

    // Setup Layout Selector
    let currentLayout = 'grid';
    document.querySelectorAll('.layout-option').forEach(opt => {
      opt.addEventListener('click', function() {
        document.querySelectorAll('.layout-option').forEach(o => o.classList.remove('selected'));
        this.classList.add('selected');
        currentLayout = this.dataset.layout;
      });
    });

    const VALID_COUNTS = [2, 3, 4, 5, 6, 7, 8, 10];
    const TILE_SIZE = 1200; // Render at high res for good quality

    stitchBtn.addEventListener('click', async () => {
      const files = imageInput.files;
      errorMsg.innerText = '';

      if (!VALID_COUNTS.includes(files.length)) {
        errorMsg.innerText = `Please select an allowed number of images (2, 3, 4, 5, 6, 7, 8, or 10). You selected ${files.length}.`;
        return;
      }

      stitchBtn.innerText = "Processing...";
      stitchBtn.disabled = true;

      try {
        const images = await loadImages(files);
        drawCanvas(images, currentLayout);
        canvasContainer.style.display = 'block';
        saveBtn.style.display = 'block';
      } catch (err) {
        errorMsg.innerText = "Error loading images.";
      }

      stitchBtn.innerText = "Stitch Images";
      stitchBtn.disabled = false;
    });

    saveBtn.addEventListener('click', () => {
      canvas.toBlob(async (blob) => {
        if (!blob) return;
        const file = new File([blob], "stitched_image.png", { type: "image/png" });
        
        // Native iOS Share Sheet - allows saving directly to Camera Roll
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          try {
            await navigator.share({
              files: [file],
              title: 'Stitched Picture'
            });
          } catch (error) {
            console.log('Share canceled or failed', error);
          }
        } else {
          // Fallback
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'stitched_image.png';
          a.click();
          URL.revokeObjectURL(url);
        }
      }, 'image/png', 1.0);
    });

    function loadImages(files) {
      const promises = Array.from(files).map(file => {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = reject;
          img.src = URL.createObjectURL(file);
        });
      });
      return Promise.all(promises);
    }

    function drawCanvas(images, layout) {
      const count = images.length;
      let cols, rows;

      if (layout === 'row') {
        cols = count;
        rows = 1;
      } else if (layout === 'col') {
        cols = 1;
        rows = count;
      } else { 
        // Grid logic based on strict allowed numbers
        if (count === 2) { cols = 2; rows = 1; }
        else if (count === 3 || count === 4) { cols = 2; rows = 2; }
        else if (count === 5 || count === 6) { cols = 3; rows = 2; }
        else if (count === 7 || count === 8) { cols = 4; rows = 2; }
        else if (count === 10) { cols = 5; rows = 2; }
      }

      canvas.width = cols * TILE_SIZE;
      canvas.height = rows * TILE_SIZE;

      // Fill background with black so empty space/borders look clean
      ctx.fillStyle = "#000000";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      images.forEach((img, index) => {
        const col = index % cols;
        const row = Math.floor(index / cols);
        const x = col * TILE_SIZE;
        const y = row * TILE_SIZE;
        
        // Use contain instead of cover so nothing is cropped
        drawContain(ctx, img, x, y, TILE_SIZE, TILE_SIZE);
      });
    }

    // Draws image replicating CSS "object-fit: contain" so entire picture stays untouched
    function drawContain(ctx, img, x, y, w, h) {
      const scale = Math.min(w / img.width, h / img.height);
      const newW = img.width * scale;
      const newH = img.height * scale;
      
      // Center the image inside its designated grid cell
      const offsetX = x + (w - newW) / 2;
      const offsetY = y + (h - newH) / 2;
      
      ctx.drawImage(img, offsetX, offsetY, newW, newH);
    }
  </script>
</body>
</html>
